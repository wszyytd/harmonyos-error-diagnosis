<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>模板 A · 雾蓝玻璃</title>
  <link rel="stylesheet" href="templates.css">
</head>
<body class="theme-a">
  <nav class="toolbar"><a href="index.html">返回选择</a><span>模板 A · 雾蓝玻璃</span><span>↑ ↓ 切页</span></nav>
  <main class="deck">
    <div class="slide-shell" id="slide-1">
      <section class="slide" data-page="A / 01">
        <span class="accent-orb sage" style="right:-120px;top:-150px"></span>
        <div class="grid-cover">
          <div>
            <span class="eyebrow">封面版式 / COVER</span>
            <h1 class="display-title">主标题<br>占位区域</h1>
            <p class="subtitle">副标题与一句话价值说明占位区域</p>
            <div class="meta-row">
              <span class="meta-pill">组别</span><span class="meta-pill">学号</span><span class="meta-pill">姓名</span>
            </div>
          </div>
          <div class="glass-shell">
            <div class="glass-core"><div class="ph-image">主界面截图 / 视觉主图</div></div>
          </div>
        </div>
      </section>
    </div>

    <div class="slide-shell" id="slide-2">
      <section class="slide" data-page="A / 02">
        <div class="grid-split">
          <div>
            <span class="eyebrow">普通内容页 / CONTENT</span>
            <h2 class="slide-title">页面标题<br>占位区域</h2>
            <p class="subtitle" style="margin-top:22px">一句话核心结论或章节说明</p>
            <div class="ph-lines"><div class="ph-line"></div><div class="ph-line"></div><div class="ph-line"></div></div>
          </div>
          <div class="bento">
            <div class="glass-shell"><div class="glass-core"><span class="ph-label">主视觉</span><div class="ph-image" style="margin-top:18px;height:calc(100% - 44px)">截图 / 流程图</div></div></div>
            <div class="glass-shell"><div class="glass-core"><span class="ph-label">信息卡片 01</span><div class="ph-lines"><div class="ph-line"></div><div class="ph-line"></div></div></div></div>
            <div class="glass-shell"><div class="glass-core"><span class="ph-label">信息卡片 02</span><div class="ph-lines"><div class="ph-line"></div><div class="ph-line"></div></div></div></div>
          </div>
        </div>
      </section>
    </div>

    <div class="slide-shell" id="slide-3">
      <section class="slide" data-page="A / 03">
        <div class="grid-feature">
          <div class="glass-shell"><div class="glass-core"><div class="ph-image" style="height:100%">重点功能截图</div></div></div>
          <div>
            <span class="eyebrow">重点功能页 / FEATURE</span>
            <h2 class="slide-title">重点功能标题</h2>
            <p class="subtitle" style="margin-top:18px">该功能解决的问题与核心结论</p>
            <div class="stack" style="margin-top:28px">
              <div class="mini-card"><span class="mini-index">01</span><div><span class="ph-label">步骤或能力</span><div class="ph-lines" style="margin-top:10px"><div class="ph-line"></div></div></div></div>
              <div class="mini-card"><span class="mini-index">02</span><div><span class="ph-label">步骤或能力</span><div class="ph-lines" style="margin-top:10px"><div class="ph-line"></div></div></div></div>
              <div class="mini-card"><span class="mini-index">03</span><div><span class="ph-label">步骤或能力</span><div class="ph-lines" style="margin-top:10px"><div class="ph-line"></div></div></div></div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <div class="slide-shell" id="slide-4">
      <section class="slide" data-page="A / 04">
        <div class="grid-data">
          <div><span class="eyebrow">数据与结论页 / EVIDENCE</span><h2 class="slide-title">关键数据或总结标题</h2></div>
          <div class="metric-row">
            <div class="metric"><span class="ph-label">数据标签</span><div class="metric-value">000</div><div class="ph-line"></div></div>
            <div class="metric" style="--metric-color:var(--sage)"><span class="ph-label">数据标签</span><div class="metric-value">00%</div><div class="ph-line"></div></div>
            <div class="metric" style="--metric-color:var(--clay)"><span class="ph-label">数据标签</span><div class="metric-value">00</div><div class="ph-line"></div></div>
          </div>
        </div>
      </section>
    </div>
  </main>
  <script src="template.js"></script>
</body>
</html>
