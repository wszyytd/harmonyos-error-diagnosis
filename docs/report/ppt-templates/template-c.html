<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>模板 C · 鼠尾草编辑</title>
  <link rel="stylesheet" href="templates.css">
</head>
<body class="theme-c">
  <nav class="toolbar"><a href="index.html">返回选择</a><span>模板 C · 鼠尾草编辑</span><span>↑ ↓ 切页</span></nav>
  <main class="deck">
    <div class="slide-shell" id="slide-1">
      <section class="slide" data-page="C / 01">
        <span class="accent-orb clay" style="right:-140px;top:-160px"></span>
        <div class="grid-cover" style="grid-template-columns:1.05fr .95fr">
          <div>
            <span class="eyebrow">封面版式 / COVER</span>
            <h1 class="display-title">主标题<br>占位区域</h1>
            <p class="subtitle">副标题与一句话价值说明占位区域</p>
            <div class="meta-row"><span class="meta-pill">组别</span><span class="meta-pill">学号</span><span class="meta-pill">姓名</span></div>
          </div>
          <div class="cascade">
            <div class="glass-shell"><div class="glass-core"><span class="ph-label">背景卡片</span></div></div>
            <div class="glass-shell"><div class="glass-core"><span class="ph-label">辅助卡片</span></div></div>
            <div class="glass-shell"><div class="glass-core"><div class="ph-image" style="height:100%">主界面截图</div></div></div>
          </div>
        </div>
      </section>
    </div>

    <div class="slide-shell" id="slide-2">
      <section class="slide" data-page="C / 02">
        <div class="grid-split">
          <div>
            <span class="eyebrow">普通内容页 / CONTENT</span>
            <h2 class="slide-title">页面标题<br>占位区域</h2>
            <p class="subtitle" style="margin-top:22px">一句话核心结论或章节说明</p>
          </div>
          <div class="stack">
            <div class="mini-card"><span class="mini-index">01</span><div><span class="ph-label">信息分组</span><div class="ph-lines" style="margin-top:10px"><div class="ph-line"></div><div class="ph-line"></div></div></div></div>
            <div class="mini-card" style="transform:translateX(26px)"><span class="mini-index">02</span><div><span class="ph-label">信息分组</span><div class="ph-lines" style="margin-top:10px"><div class="ph-line"></div><div class="ph-line"></div></div></div></div>
            <div class="mini-card" style="transform:translateX(-12px)"><span class="mini-index">03</span><div><span class="ph-label">信息分组</span><div class="ph-lines" style="margin-top:10px"><div class="ph-line"></div><div class="ph-line"></div></div></div></div>
          </div>
        </div>
      </section>
    </div>

    <div class="slide-shell" id="slide-3">
      <section class="slide" data-page="C / 03">
        <div class="grid-feature">
          <div class="cascade">
            <div class="glass-shell"><div class="glass-core"><span class="ph-label">过程</span></div></div>
            <div class="glass-shell"><div class="glass-core"><span class="ph-label">证据</span></div></div>
            <div class="glass-shell"><div class="glass-core"><div class="ph-image" style="height:100%">重点功能截图</div></div></div>
          </div>
          <div>
            <span class="eyebrow">重点功能页 / FEATURE</span>
            <h2 class="slide-title">重点功能标题</h2>
            <p class="subtitle" style="margin-top:18px">该功能解决的问题与核心结论</p>
            <div class="ph-lines" style="margin-top:34px"><div class="ph-line"></div><div class="ph-line"></div><div class="ph-line"></div></div>
            <div class="meta-row"><span class="meta-pill">能力标签</span><span class="meta-pill">结果标签</span></div>
          </div>
        </div>
      </section>
    </div>

    <div class="slide-shell" id="slide-4">
      <section class="slide" data-page="C / 04">
        <div class="grid-data">
          <div><span class="eyebrow">数据与结论页 / EVIDENCE</span><h2 class="slide-title">关键数据或总结标题</h2></div>
          <div class="metric-row">
            <div class="metric"><span class="ph-label">数据标签</span><div class="metric-value">000</div><div class="ph-line"></div></div>
            <div class="metric" style="--metric-color:var(--sage);transform:translateY(22px)"><span class="ph-label">数据标签</span><div class="metric-value">00%</div><div class="ph-line"></div></div>
            <div class="metric" style="--metric-color:var(--clay);transform:translateY(-12px)"><span class="ph-label">数据标签</span><div class="metric-value">00</div><div class="ph-line"></div></div>
          </div>
        </div>
      </section>
    </div>
  </main>
  <script src="template.js"></script>
</body>
</html>
